name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          mkdir -p public
          # Docsify 関連ファイル
          cp index.html index.json _sidebar.md LICENSE public/
          cp -r ja en public/
          # 各アドオンフォルダ（zipを含む）をコピー
          for dir in */; do
            case "$dir" in
              public/|scripts/|templates/|.github/|ja/|en/) continue ;;
              *) cp -r "$dir" public/ ;;
            esac
          done

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "public"
      - id: deployment
        uses: actions/deploy-pages@v4
